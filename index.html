  {l:"w",q:"Write down the top 3 things your partner does that make you feel most loved. Both players. Compare."},
  {l:"w",q:"Write a short guide of how to love your partner well. 30 seconds. Compare."},
  {l:"w",q:"Write a love song for your partner. 1 minute. Perform for each other."},
  {l:"w",q:"Draw one of your favorite memories from our relationship. 30 seconds. Compare."},
  {l:"w",q:"Write down the title you would give this chapter of our relationship. Compare."},
  {l:"w",q:"Ask your partner something you've never asked them before."},
  {l:"w",q:"Write down the top 3 things you're most grateful for in your partner. 30 seconds. Compare."},
  {l:"w",q:"Write down your intention for our relationship. Compare."},
];

const LEVEL_LABELS = {'1':'Level 1 — Perception','2':'Level 2 — Connection','3':'Level 3 — Reflection','w':'Wildcard'};
const LEVEL_CLASSES = {'1':'level1','2':'level2','3':'level3','w':'wildcard'};

let remaining = [...ALL_CARDS];
let drawn = 0;
let filter = 'all';
let currentCard = null;
const TOTAL = ALL_CARDS.length;

function getPool() {
  return filter === 'all' ? remaining : remaining.filter(c => c.l === filter);
}

function updateProgress() {
  const pct = Math.round((drawn / TOTAL) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = drawn + ' / ' + TOTAL;
}

function drawCard() {
  const pool = getPool();
  if (pool.length === 0) { showDone(); return; }
  const idx = Math.floor(Math.random() * pool.length);
  currentCard = pool[idx];
  remaining = remaining.filter(c => c !== currentCard);
  drawn++;
  renderCard(currentCard);
  updateProgress();
  const btn = document.getElementById('btn-draw');
  if (getPool().length === 0) { btn.disabled = true; btn.textContent = 'All done!'; }
}

function skipCard() {
  if (!currentCard) return;
  remaining.push(currentCard);
  drawn--;
  currentCard = null;
  updateProgress();
  document.getElementById('card-stage').innerHTML = '<div class="card idle"><div class="idle-text">Card skipped —<br>draw again</div></div>';
  const btn = document.getElementById('btn-draw');
  btn.disabled = false; btn.textContent = 'Draw a card';
}

function renderCard(card) {
  const stage = document.getElementById('card-stage');
  const cls = LEVEL_CLASSES[card.l];
  stage.innerHTML = `<div class="card ${cls} card-anim">
    <div class="card-level-badge">${LEVEL_LABELS[card.l]}</div>
    <div class="card-question">${card.q}</div>
    <div class="card-footer">We Are Not Really Strangers · Franci Edition</div>
    <div class="card-num-pill">#${drawn}</div>
  </div>`;
}

function showDone() {
  document.getElementById('card-stage').innerHTML = '<div class="done-card"><div class="big">That\'s all of them.</div><div class="sub">213 cards · Franci Edition</div></div>';
  const btn = document.getElementById('btn-draw');
  btn.disabled = true; btn.textContent = 'Deck complete';
}

function setFilter(f) {
  filter = f;
  ['all','1','2','3','w'].forEach(k => {
    const t = document.getElementById('tab-' + k);
    if (t) t.classList.toggle('active', k === f);
  });
}

function resetGame() {
  remaining = [...ALL_CARDS]; drawn = 0; currentCard = null;
  updateProgress();
  document.getElementById('card-stage').innerHTML = '<div class="card idle"><div class="idle-text">Deck reset —<br>ready to play</div></div>';
  const btn = document.getElementById('btn-draw');
  btn.disabled = false; btn.textContent = 'Draw a card';
}

updateProgress();

document.addEventListener('DOMContentLoaded', function() {
  document.body.style.margin = '0';
  document.body.style.background = '#0d0608';
  document.documentElement.style.background = '#0d0608';
});
</script>
