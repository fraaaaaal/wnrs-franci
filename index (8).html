  .card.wildcard .card-question { color: #e0a0a8; font-size: clamp(18px, 4vw, 24px); }
  .card-footer { font-size: clamp(9px, 1.8vw, 11px); color: rgba(255,255,255,0.15); letter-spacing: 0.1em; text-transform: uppercase; margin-top: clamp(0.8rem, 2.5vw, 1.2rem); align-self: center; text-align: center; }

  .middle-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0.55rem; padding: clamp(0.5rem, 1.5vw, 0.9rem) 0; }

  .btn-draw:hover { background: #a82438; }

  .btn-row { display: flex; gap: 10px; align-items: center; }
  .btn-small { background: transparent; border: 1px solid #1e0810; color: #5a2830; border-radius: 20px; padding: clamp(6px, 1.8vw, 9px) clamp(14px, 3.5vw, 20px); font-size: clamp(10px, 2.2vw, 12px); font-family: 'Inter', sans-serif; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; text-transform: uppercase; -webkit-appearance: none; touch-action: manipulation; }
  .btn-small:hover, .btn-small:active { border-color: #8b1e2f; color: #c0848e; }

  .disc-inner { width: 35%; height: 35%; border-radius: 50%; background: #0a0305; position: absolute; z-index: 2; }
  .disc-ring { width: 70%; height: 70%; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); position: absolute; z-index: 1; }
  .music-info { flex: 1; min-width: 0; }
  .music-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(12px, 2.8vw, 15px); color: #c0848e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .ctrl-btn:hover { color: #c0848e; }
  .ctrl-btn:active { transform: scale(0.9); color: #c0848e; }
  .ctrl-btn svg { width: clamp(16px, 3.5vw, 20px); height: clamp(16px, 3.5vw, 20px); }
  .ctrl-btn.play-btn { color: #c0848e; }
  .ctrl-btn.play-btn svg { width: clamp(26px, 5.5vw, 32px); height: clamp(26px, 5.5vw, 32px); }

  .seek-fill { height: 100%; background: #8b1e2f; border-radius: 3px; width: 0%; pointer-events: none; transition: width 0.3s linear; }
  .seek-thumb { position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: #c0848e; pointer-events: none; opacity: 0; transition: opacity 0.2s, left 0.3s linear; }
  .seek-track:hover .seek-thumb, .seek-track:active .seek-thumb { opacity: 1; }

  .done-card .big { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(24px, 5.5vw, 32px); color: #c0848e; }
  .done-card .sub { font-size: clamp(11px, 2.2vw, 13px); color: #5a2830; letter-spacing: 0.1em; text-transform: uppercase; }

  .card.state-card {
    background: rgba(139, 30, 47, 0.12);
    border: 1px dashed rgba(139, 30, 47, 0.35);

    align-items: center;

  .state-card-inner {

<div class="game-root">
  <div class="top-section">
    <div class="game-title">
      <div class="brand">We're Not Really Strangers</div>
      <div class="edition">Franci Edition</div>
    </div>
    <div class="progress-row">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-fill"></div></div>
      <div class="progress-label" id="prog-label">0 / 213</div>
    </div>
    <div class="level-tabs">
      <button class="level-tab active" onclick="playClick();setFilter('all')" id="tab-all">All</button>
      <button class="level-tab" onclick="playClick();setFilter('1')" id="tab-1">Level 1</button>
      <button class="level-tab" onclick="playClick();setFilter('2')" id="tab-2">Level 2</button>
      <button class="level-tab" onclick="playClick();setFilter('3')" id="tab-3">Level 3</button>
      <button class="level-tab" onclick="playClick();setFilter('w')" id="tab-w">Wild</button>
    </div>
  </div>
  <div class="card-stage" id="card-stage">
    <div class="card idle">
      <div class="welcome-inner">
        <div class="welcome-eyebrow">a game about</div>
        <div class="welcome-headline">we're not<br>really strangers</div>
        <div class="welcome-rule"></div>
        <div class="welcome-body">213 cards. zero small talk.<br>answer honestly.</div>
        <div class="welcome-cta">draw your first card to begin</div>
      </div>
    </div>
  </div>
  <div class="middle-section">
    <button class="btn-draw" id="btn-draw" onclick="playClick();drawCard()">Draw a card</button>
    <div class="btn-row">
      <button class="btn-small" onclick="playClick();resetGame()">Restart</button>
      <button class="btn-small" onclick="playClick();skipCard()">Skip</button>
    </div>
  </div>
  <div class="music-bar">
    <div class="music-top-row">
      <div class="music-disc" id="music-disc"><div class="disc-ring"></div><div class="disc-inner"></div></div>
      <div class="music-info">
        <div class="music-title" id="music-title">Cherry</div>
        <div class="music-artist" id="music-artist">Chromatics</div>
      </div>
      <div class="music-controls">
        <button class="ctrl-btn" onclick="playClick();prevTrack()" title="Previous"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="ctrl-btn play-btn" id="play-btn" onclick="playClick();togglePlay()" title="Play/Pause"><svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="ctrl-btn" onclick="playClick();nextTrack()" title="Next"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg></button>
        <button class="ctrl-btn" id="mute-btn" onclick="playClick();toggleMute()" title="Mute"><svg id="mute-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
      </div>
    </div>
    <div class="music-seek-row">
      <span class="time-label" id="time-current">0:00</span>
      <div class="seek-track" id="seek-track" onclick="seekTo(event)" ontouchend="seekTouch(event)">
        <div class="seek-fill" id="seek-fill"></div>
        <div class="seek-thumb" id="seek-thumb"></div>
      </div>
      <span class="time-label right" id="time-total">0:00</span>
    </div>
  </div>
</div>

let clickBuffer = null;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

function loadClick() {
  try {
    ensureAudio();
    audioCtx.decodeAudioData(b64ToArrayBuffer(CLICK_B64), function(buf) {
      clickBuffer = buf;
    });
  } catch(e) {}
}

function playClick() {
  try {
    ensureAudio();
    if (!clickBuffer) { loadClick(); return; }
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer = clickBuffer;
    gain.gain.value = 0.7;
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  document.addEventListener('click', function onFirst() {
    loadClick();
    document.removeEventListener('click', onFirst);
  }, { once: true });
});

/* ── SOUNDCLOUD PLAYER ── */
const TRACKS = [
  { title: "Cherry", artist: "Chromatics" },
  { title: "Closer to Grey", artist: "Chromatics" },
  { title: "There's a Light Out on the Horizon", artist: "Chromatics" },
  { title: "Nothing's Gonna Hurt You Baby", artist: "Cigarettes After Sex" },
  { title: "Apocalypse", artist: "Cigarettes After Sex" },
  { title: "Space Song", artist: "Beach House" },
];

let currentTrack = 0, isPlaying = false, isMuted = false;
let players = [], playersReady = [];
let seekInterval = null, isSeeking = false;

function initPlayers() {
  for (let i = 0; i < TRACKS.length; i++) {
    const player = SC.Widget(document.getElementById('sc-' + i));
    players.push(player); playersReady.push(false);
    const idx = i;
    player.bind(SC.Widget.Events.READY, function() {
      playersReady[idx] = true;
      player.setVolume(isMuted ? 0 : 80);
      if (idx === 0) player.getDuration(function(d) { document.getElementById('time-total').textContent = formatTime(d/1000); });
    });
    player.bind(SC.Widget.Events.FINISH, function() { nextTrack(); });
  }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s/60) + ':' + (Math.floor(s%60)<10?'0':'') + Math.floor(s%60);
}

function startSeekPoller() {
  clearInterval(seekInterval);
  seekInterval = setInterval(function() {
    if (!isPlaying || isSeeking) return;
    const p = players[currentTrack];
    if (!p || !playersReady[currentTrack]) return;
    p.getPosition(function(pos) {
      p.getDuration(function(dur) {
        if (!dur) return;
        const pct = (pos/dur)*100;
        document.getElementById('seek-fill').style.width = pct+'%';
        document.getElementById('seek-thumb').style.left = pct+'%';
        document.getElementById('time-current').textContent = formatTime(pos/1000);
        document.getElementById('time-total').textContent = formatTime(dur/1000);
      });
    });
  }, 500);
}

function seekTo(e) {
  const track = document.getElementById('seek-track');
  const rect = track.getBoundingClientRect();
  doSeek(Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width)));
}

function seekTouch(e) {
  e.preventDefault();
  const track = document.getElementById('seek-track');
  const rect = track.getBoundingClientRect();
  const touch = e.changedTouches[0];
  doSeek(Math.max(0, Math.min(1, (touch.clientX-rect.left)/rect.width)));
}

function doSeek(pct) {
  const p = players[currentTrack];
  if (!p || !playersReady[currentTrack]) return;
  isSeeking = true;
  p.getDuration(function(dur) {
    const pos = pct * dur;
    document.getElementById('seek-fill').style.width = (pct*100)+'%';
    document.getElementById('seek-thumb').style.left = (pct*100)+'%';
    document.getElementById('time-current').textContent = formatTime(pos/1000);
    p.seekTo(pos);
    setTimeout(function() { isSeeking = false; }, 600);
  });
}

function updateTrackDisplay() {
  document.getElementById('music-title').textContent = TRACKS[currentTrack].title;
  document.getElementById('music-artist').textContent = TRACKS[currentTrack].artist;
  document.getElementById('seek-fill').style.width = '0%';
  document.getElementById('seek-thumb').style.left = '0%';
  document.getElementById('time-current').textContent = '0:00';
  document.getElementById('time-total').textContent = '0:00';
  if (playersReady[currentTrack]) players[currentTrack].getDuration(function(d) { document.getElementById('time-total').textContent = formatTime(d/1000); });
}

function setPlayIcon(p) {
  document.getElementById('play-icon').innerHTML = p ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  document.getElementById('music-disc').classList.toggle('spinning', p);
}

function togglePlay() {
  if (!isPlaying) {
    if (!playersReady[currentTrack]) return;
    players[currentTrack].play(); isPlaying = true; setPlayIcon(true); startSeekPoller();
  } else {
    players[currentTrack].pause(); isPlaying = false; setPlayIcon(false);
  }
}

function stopCurrent() {
  if (players[currentTrack]) { players[currentTrack].pause(); players[currentTrack].seekTo(0); }
}

function nextTrack() {
  stopCurrent(); currentTrack = (currentTrack+1) % TRACKS.length; updateTrackDisplay();
  if (isPlaying) setTimeout(function() { if (playersReady[currentTrack]) { players[currentTrack].play(); startSeekPoller(); } }, 400);
}

function prevTrack() {
  stopCurrent(); currentTrack = (currentTrack-1+TRACKS.length) % TRACKS.length; updateTrackDisplay();
  if (isPlaying) setTimeout(function() { if (playersReady[currentTrack]) { players[currentTrack].play(); startSeekPoller(); } }, 400);
}

function toggleMute() {
  isMuted = !isMuted;
  players.forEach(function(p) { if (p) p.setVolume(isMuted?0:80); });
  document.getElementById('mute-btn').classList.toggle('muted', isMuted);
  document.getElementById('mute-icon').innerHTML = isMuted
    ? '<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19l2 2L21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>'
    : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}

const LEVEL_LABELS = {'1':'Level 1 — Perception','2':'Level 2 — Connection','3':'Level 3 — Reflection','w':'Wildcard'};
const LEVEL_CLASSES = {'1':'level1','2':'level2','3':'level3','w':'wildcard'};
let remaining = [...ALL_CARDS], drawn = 0, filter = 'all', currentCard = null;
const TOTAL = ALL_CARDS.length;

function getPool() { return filter==='all' ? remaining : remaining.filter(function(c){return c.l===filter;}); }

function updateProgress() {
  const pct = Math.round((drawn/TOTAL)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = drawn+' / '+TOTAL;
}

function drawCard() {
  const pool = getPool();
  if (pool.length===0) { showDone(); return; }
  const idx = Math.floor(Math.random()*pool.length);
  currentCard = pool[idx];
  remaining = remaining.filter(function(c){return c!==currentCard;});
  drawn++;
  renderCard(currentCard);
  updateProgress();
  const btn = document.getElementById('btn-draw');
  if (getPool().length===0) { btn.disabled=true; btn.textContent='All done!'; }
}

function skipCard() {
  if (!currentCard) return;
  remaining.push(currentCard); drawn--; currentCard=null;
  updateProgress();
  document.getElementById('card-stage').innerHTML='<div class="card state-card"><div class="state-card-inner"><span class="state-card-text">Card skipped</span><span class="state-card-sub">draw again</span></div></div>';
  const btn=document.getElementById('btn-draw'); btn.disabled=false; btn.textContent='Draw a card';
}

function renderCard(card) {
  const cls=LEVEL_CLASSES[card.l];
  document.getElementById('card-stage').innerHTML='<div class="card '+cls+' card-anim"><div class="card-level-badge">'+LEVEL_LABELS[card.l]+'</div><div class="card-question">'+card.q+'</div><div class="card-footer">We Are Not Really Strangers · Franci Edition</div><div class="card-num-pill">#'+drawn+'</div></div>';
}

function showDone() {
  document.getElementById('card-stage').innerHTML='<div class="done-card"><div class="big">That\'s all of them.</div><div class="sub">213 cards · Franci Edition</div></div>';
  const btn=document.getElementById('btn-draw'); btn.disabled=true; btn.textContent='Deck complete';
}

function setFilter(f) {
  filter=f;
  ['all','1','2','3','w'].forEach(function(k){ const t=document.getElementById('tab-'+k); if(t) t.classList.toggle('active',k===f); });
}

function resetGame() {
  remaining=[...ALL_CARDS]; drawn=0; currentCard=null;
  updateProgress();
  document.getElementById('card-stage').innerHTML='<div class="card state-card"><div class="state-card-inner"><span class="state-card-text">Deck reset</span><span class="state-card-sub">ready to play</span></div></div>';
  const btn=document.getElementById('btn-draw'); btn.disabled=false; btn.textContent='Draw a card';
}

updateProgress();
</script>
